name: collector_flutter
description: >-
  Real-time resource monitoring for Flutter apps — FPS, jank, memory, CPU,
  battery, HTTP traffic, and custom events with an embedded dashboard and
  actionable recommendations.
version: 0.1.0
repository: https://github.com/BeatrizVocurcaFrade/collector_flutter
homepage: https://github.com/BeatrizVocurcaFrade/collector_flutter
issue_tracker: https://github.com/BeatrizVocurcaFrade/collector_flutter/issues

topics:
  - flutter
  - performance
  - monitoring
  - profiling
  - telemetry

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  vm_service: ^14.2.5
  google_fonts: ^6.2.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: br.ufmg.collector_flutter
        pluginClass: CollectorFlutterPlugin
      ios:
        pluginClass: CollectorFlutterPlugin
